function renderNewExercises(mod, lesson) {
  const gen = getGeneratedExercises(lesson);
  const hasCloze = gen.cloze.length > 0;
  const hasReorder = gen.reorder.length > 0;
  const hasMatch = gen.match.length > 0;
  const hasDictation = gen.dictation.length > 0;
  const hasContext = gen.context.length > 0;
  const hasForm     = gen.form     && gen.form.length     > 0;
  const hasReading  = gen.reading  && gen.reading.length  > 0;
  const hasTemplate = gen.template && gen.template.length > 0;
  const hasFoto     = lesson.fotokaart && lesson.fotokaart.length > 0;
  const hasLuister  = gen.luister && gen.luister.length > 0;

  if (!hasCloze && !hasReorder && !hasMatch && !hasDictation && !hasContext && !hasForm && !hasReading && !hasTemplate && !hasFoto && !hasLuister) {
    return `<div style="text-align:center;padding:40px 20px;color:#888">
      <div style="font-size:48px;margin-bottom:12px">📝</div>

      <p style="font-size:13px">ยังไม่มีแบบฝึกหัดเชิงโต้ตอบสำหรับบทเรียนนี้</p>
    </div>`;
  }

  return `
    <div style="background:#FFF8F0;border:1px solid #F5DEC0;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#888">
      ✏️ Interactive exercises generated from this lesson's vocabulary and dialogues. · แบบฝึกหัดเชิงโต้ตอบจากคำศัพท์และบทสนทนา
    </div>

    ${hasDictation ? `
      <div class="exercise-section-title">🎧 Dictation · ฟังแล้วเขียน</div>
      ${gen.dictation.map((ex, i) => renderDictationExercise(ex, i, mod)).join('')}
    ` : ''}

    ${hasContext ? `
      <div class="exercise-section-title">📖 Context · เลือกคำที่ถูกต้อง</div>
      ${gen.context.map((ex, i) => renderContextExercise(ex, i, mod)).join('')}
    ` : ''}

    ${hasCloze ? `
      <div class="exercise-section-title">📝 Fill in the Blank · เติมคำในช่องว่าง</div>
      ${gen.cloze.map((ex, i) => renderClozeExercise(ex, i, mod)).join('')}
    ` : ''}

    ${hasReorder ? `
      <div class="exercise-section-title">🔀 Word Order · จัดเรียงคำ</div>
      ${gen.reorder.map((ex, i) => renderReorderExercise(ex, i, mod, lesson)).join('')}
    ` : ''}

    ${hasMatch ? `
      <div class="exercise-section-title">🔗 Match Words · จับคู่คำศัพท์</div>
      ${gen.match.map((ex, i) => renderMatchExercise(ex, i, mod, lesson)).join('')}
    ` : ''}

    ${hasForm ? `
      <div class="exercise-section-title">📋 Form Practice · กรอกแบบฟอร์ม</div>
      ${gen.form.map((ex, i) => renderFormExercise(ex, i, mod, lesson)).join('')}
    ` : ''}

    ${hasReading ? `
      <div class="exercise-section-title">📖 Reading Comprehension · ทำความเข้าใจบทอ่าน</div>
      ${gen.reading.map((ex, i) => renderReadingExercise(ex, i, mod, lesson)).join('')}
    ` : ''}

    ${hasTemplate ? `
      <div class="exercise-section-title">✉️ Letter & Email Templates · แบบฝึกจดหมาย</div>
      ${gen.template.map((ex, i) => renderTemplateExercise(ex, i, mod, lesson)).join('')}
    ` : ''}

    ${hasLuister ? `
      <div class="exercise-section-title">🔊 Luisteroefening · ฟังแล้วเลือกความหมาย</div>
      ${gen.luister.map((ex, i) => renderLuisterExercise(ex, i, mod, lesson)).join('')}
    ` : ''}

    ${hasFoto ? `
      <div class="exercise-section-title">🖼️ Fotokaart · Beschrijf de foto</div>
      ${lesson.fotokaart.map((ex, i) => renderFotokaartExercise(ex, i, mod, lesson)).join('')}
    ` : ''}

    ${(() => {
      const isCompleted = state.completedLessons[lesson.id];
      const lessonWords = lesson.vocab.length
        + (lesson.dialogues||[]).reduce((s,d)=>s+(d.lines||[]).length,0)
        + (lesson.grammar?(lesson.grammar.examples||[]).length:0);
      if (isCompleted) {
        return `<div style="background:#E8F8E8;border:1px solid #C8E6C0;border-radius:10px;padding:14px 16px;margin-top:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
          <span style="font-size:14px;color:#2E7D32;font-weight:600">✅ ${t('บทเรียนเสร็จสมบูรณ์แล้ว','Lesson completed!')} · ${lessonWords} ${t('คำเพิ่มความก้าวหน้า','words in progress')}</span>
        </div>`;
      }
      return `<div style="margin-top:24px;text-align:center">
        <button onclick="(function(){const wasNew=!state.completedLessons['${lesson.id}'];state.completedLessons={...state.completedLessons,'${lesson.id}':true};if(typeof saveCompleted==='function')saveCompleted();if(wasNew&&typeof awardLessonXP==='function')awardLessonXP();render();})()" style="background:${mod.color};color:#fff;border:none;border-radius:10px;padding:14px 28px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,0.15)">
          ✅ ${t('บทเรียนนี้เสร็จสมบูรณ์','Mark Lesson Complete')} · +${lessonWords} ${t('คำ','words')}
        </button>
        <p style="font-size:12px;color:#aaa;margin-top:8px">${t('แตะเมื่อคุณทำแบบฝึกหัดเสร็จแล้ว','Tap when you\'ve finished the exercises')}</p>
      </div>`;
    })()}
  `;
}

function renderClozeExercise(ex, idx, mod) {
  const stateKey = `cloze_${idx}`;
  const answer = state.clozeAnswers[stateKey];
  const checked = answer !== undefined && answer !== null && state.clozeAnswers[stateKey + '_checked'];
  const isCorrect = checked && answer.toLowerCase().trim() === ex.answer.toLowerCase().trim();
  const isWrong = checked && !isCorrect;

  return `
    <div class="exercise-card" style="border-left-color:${checked ? (isCorrect ? '#5E9B4E' : '#E74C3C') : mod.color}">
      <div style="font-size:12px;color:#888;margin-bottom:8px">💡 Hint: ${escHtml(ex.hint)} ${ex.hintTh ? `· ${ex.hintTh}` : ''}</div>
      <div class="question serif" style="font-size:17px;line-height:1.8">
        ${ex.sentence.replace('___', `<input type="text" class="cloze-input ${isCorrect ? 'correct' : isWrong ? 'wrong' : ''}"
          value="${escHtml(answer || '')}"
          placeholder="..."
          ${checked ? 'disabled' : ''}
          oninput="state.clozeAnswers['${stateKey}']=this.value"
          onkeydown="if(event.key==='Enter')checkCloze('${stateKey}','${escHtml(ex.answer).replace(/'/g,"\\'")}')"
        >`)}
      </div>
      ${!checked ? `
        <button style="margin-top:10px;padding:8px 16px;border-radius:8px;border:2px solid ${mod.color};background:#fff;color:${mod.color};font-weight:600;cursor:pointer;font-family:inherit;font-size:13px"
          onclick="checkCloze('${stateKey}','${escHtml(ex.answer).replace(/'/g,"\\'")}')">
          Check · ตรวจ
        </button>
      ` : `
        <div style="margin-top:10px;font-size:14px">
          ${isCorrect ? `<span style="color:#5E9B4E;font-weight:600">✅ Correct! · ถูกต้อง!</span>` :
            `<span style="color:#E74C3C;font-weight:600">❌ The answer is: <strong style="color:#333">${escHtml(ex.answer)}</strong></span>`}
          <div style="color:#888;font-size:13px;margin-top:4px">Full sentence: ${escHtml(ex.full)}</div>
        </div>
      `}
    </div>
  `;
}

function renderReadingExercise(ex, idx, mod, lesson) {
  const sk = `reading_${lesson.id}_${idx}`;
  if (!state.readingState) state.readingState = {};
  if (!state.readingState[sk]) state.readingState[sk] = { answers: {}, checked: false, showText: true };
  const rs = state.readingState[sk];

  // Format text: newlines → <br>, blank lines → paragraph break
  const formattedText = escHtml(ex.text)
    .replace(/\n\n/g, '</p><p style="margin:8px 0">')
    .replace(/\n/g, '<br>');

  const questionsHtml = ex.questions.map((q, qi) => {
    const ans = rs.answers[qi];
    const checked = rs.checked;
    const correct = checked && ans === q.answer;
    const wrong   = checked && ans !== undefined && !correct;
    return `
      <div style="margin-bottom:14px">
        <div style="font-size:14px;font-weight:600;margin-bottom:6px">${qi+1}. ${escHtml(q.question)}</div>
        <div style="font-size:12px;color:#888;margin-bottom:8px">${escHtml(q.th)}</div>
        <div style="display:flex;flex-direction:column;gap:6px">
          ${q.options.map(opt => {
            let bg = '#fff', border = '#ddd', color = '#333', icon = '';
            if (checked) {
              if (opt === q.answer)             { bg='#F0FFF4'; border='#5E9B4E'; color='#2d7a2d'; icon='✓ '; }
              else if (opt === ans && wrong)    { bg='#FFF0F0'; border='#E74C3C'; color='#c0392b'; icon='✗ '; }
            } else if (ans === opt)             { bg='#EEF4FF'; border=mod.color; }
            return `<button onclick="if(!state.readingState)state.readingState={};if(!state.readingState['${sk}'])state.readingState['${sk}']={answers:{},checked:false,showText:true};if(!state.readingState['${sk}'].checked)state.readingState['${sk}'].answers[${qi}]='${opt.replace(/'/g,"\\'")}';render(true)"
              style="text-align:left;padding:8px 12px;border:2px solid ${border};border-radius:8px;background:${bg};color:${color};font-size:13px;cursor:pointer;font-family:inherit;font-weight:${checked && opt===q.answer?'600':'400'}"
              ${checked ? 'disabled' : ''}>${icon}${escHtml(opt)}</button>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');

  const totalQ   = ex.questions.length;
  const correctN = rs.checked ? ex.questions.filter((q,qi) => rs.answers[qi] === q.answer).length : 0;

  return `
    <div class="exercise-card" style="border-left-color:${rs.checked ? (correctN===totalQ?'#5E9B4E':'#E67E22') : mod.color};margin-bottom:20px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div>
          <div style="font-weight:700;font-size:15px">${escHtml(ex.title)}</div>
          <div style="font-size:12px;color:#888">${escHtml(ex.titleTh||'')}</div>
        </div>
        <button onclick="if(!state.readingState)state.readingState={};if(!state.readingState['${sk}'])state.readingState['${sk}']={answers:{},checked:false,showText:true};state.readingState['${sk}'].showText=!state.readingState['${sk}'].showText;render(true)"
          style="padding:6px 12px;border:1px solid #ddd;border-radius:8px;background:#f8f8f8;font-size:12px;cursor:pointer;font-family:inherit">
          ${rs.showText ? '▲ Hide text' : '▼ Show text'}
        </button>
      </div>
      ${rs.showText ? `
        <div style="background:#F8F9FF;border:1px solid #E0E4F0;border-radius:8px;padding:14px 16px;margin-bottom:16px;font-size:14px;line-height:1.8;white-space:pre-wrap;font-family:inherit">
          <p style="margin:8px 0">${formattedText}</p>
        </div>` : ''}
      <div style="margin-bottom:14px">${questionsHtml}</div>
      ${!rs.checked ? `
        <button onclick="if(!state.readingState)state.readingState={};if(!state.readingState['${sk}'])state.readingState['${sk}']={answers:{},checked:false,showText:true};state.readingState['${sk}'].checked=true;render(true)"
          style="padding:10px 20px;border-radius:8px;border:2px solid ${mod.color};background:#fff;color:${mod.color};font-weight:700;cursor:pointer;font-family:inherit;font-size:14px">
          ✓ Check Answers · ตรวจ
        </button>` : `
        <div style="padding:10px 16px;border-radius:8px;background:${correctN===totalQ?'#F0FFF4':'#FFF8F0'};font-size:14px;font-weight:600;color:${correctN===totalQ?'#5E9B4E':'#E67E22'}">
          ${correctN}/${totalQ} correct ${correctN===totalQ?'🎉':'— review the highlighted answers above'}
        </div>`}
    </div>`;
}

function renderTemplateExercise(ex, idx, mod, lesson) {
  const sk = `template_${lesson.id}_${idx}`;
  if (!state.templateState) state.templateState = {};
  if (!state.templateState[sk]) state.templateState[sk] = { answers: {}, checked: false };
  const ts = state.templateState[sk];

  const blankNums = Object.keys(ex.blanks).sort();
  const totalBlanks = blankNums.length;
  const correctN = ts.checked ? blankNums.filter(n => (ts.answers[n]||'').trim().toLowerCase() === ex.blanks[n].answer.toLowerCase()).length : 0;

  // Render template lines, substituting [N] with select dropdowns or result badges
  const templateHtml = ex.template.map(line => {
    let rendered = escHtml(line);
    blankNums.forEach(n => {
      const blank = ex.blanks[n];
      const ans = ts.answers[n] || '';
      const correct = ts.checked && ans.toLowerCase() === blank.answer.toLowerCase();
      const wrong   = ts.checked && ans && !correct;
      const placeholder = `[${n}]`;
      const escapedPH = escHtml(placeholder);
      let widget;
      if (!ts.checked) {
        const opts = blank.options.map(o =>
          `<option value="${escHtml(o)}" ${ans===o?'selected':''}>${escHtml(o)}</option>`
        ).join('');
        widget = `<select onchange="if(!state.templateState)state.templateState={};if(!state.templateState['${sk}'])state.templateState['${sk}']={answers:{},checked:false};state.templateState['${sk}'].answers['${n}']=this.value;render(true)"
          style="display:inline-block;padding:2px 6px;border:2px solid ${ans?mod.color:'#ccc'};border-radius:6px;font-size:13px;font-family:inherit;background:#fff;cursor:pointer;max-width:160px">
          <option value="">— [${n}] —</option>${opts}</select>`;
      } else {
        widget = `<span style="display:inline-block;padding:2px 8px;border-radius:6px;font-weight:700;font-size:13px;background:${correct?'#E8F8E8':'#FFE8E8'};color:${correct?'#2d7a2d':'#c0392b'};border:2px solid ${correct?'#5E9B4E':'#E74C3C'}">${escHtml(ans||'?')}${wrong?` <span style="font-size:11px;color:#888">→ ${escHtml(blank.answer)}</span>`:''}</span>`;
      }
      rendered = rendered.replace(escapedPH, widget);
    });
    return `<div style="min-height:22px;line-height:2">${rendered}</div>`;
  }).join('');

  return `
    <div class="exercise-card" style="border-left-color:${ts.checked?(correctN===totalBlanks?'#5E9B4E':'#E67E22'):mod.color};margin-bottom:20px">
      <div style="font-weight:700;font-size:15px;margin-bottom:2px">${escHtml(ex.title)}</div>
      <div style="font-size:12px;color:#888;margin-bottom:8px">${escHtml(ex.titleTh||'')}</div>
      <div style="background:#FFFBF0;border:1px solid #F5DEC0;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px">
        📋 ${escHtml(ex.scenario)}<br>
        <span style="color:#888;font-size:12px">${escHtml(ex.scenarioTh||'')}</span>
      </div>
      <div style="background:#F8F9FF;border:1px solid #E0E4F0;border-radius:8px;padding:14px 16px;margin-bottom:14px;font-size:14px;line-height:2.2">
        ${templateHtml}
      </div>
      <div style="margin-bottom:12px">
        ${blankNums.map(n => `<div style="font-size:12px;color:#888;margin-bottom:3px">[${n}] = ${escHtml(ex.blanks[n].hint)}</div>`).join('')}
      </div>
      ${!ts.checked ? `
        <button onclick="if(!state.templateState)state.templateState={};if(!state.templateState['${sk}'])state.templateState['${sk}']={answers:{},checked:false};state.templateState['${sk}'].checked=true;render(true)"
          style="padding:10px 20px;border-radius:8px;border:2px solid ${mod.color};background:#fff;color:${mod.color};font-weight:700;cursor:pointer;font-family:inherit;font-size:14px">
          ✓ Check Letter · ตรวจจดหมาย
        </button>` : `
        <div style="padding:10px 16px;border-radius:8px;background:${correctN===totalBlanks?'#F0FFF4':'#FFF8F0'};font-size:14px;font-weight:600;color:${correctN===totalBlanks?'#5E9B4E':'#E67E22'}">
          ${correctN}/${totalBlanks} blanks correct ${correctN===totalBlanks?'🎉 Perfect letter!':'— see corrections above'}
        </div>`}
    </div>`;
}

function checkCloze(stateKey, answer) {
  state.clozeAnswers[stateKey + '_checked'] = true;
  render(true);
}

function renderFormExercise(ex, idx, mod, lesson) {
  const stateKey = `form_${lesson.id}_${idx}`;
  if (!state.formState) state.formState = {};
  if (!state.formState[stateKey]) state.formState[stateKey] = { answers: {}, checked: false };
  const fs = state.formState[stateKey];

  const fieldsHtml = ex.fields.map((field, fi) => {
    const val = fs.answers[fi] || '';
    const checked = fs.checked;
    const correct = checked && val.trim().toLowerCase() === field.answer.toLowerCase();
    const wrong = checked && !correct;
    return `
      <div style="margin-bottom:14px">
        <div style="font-size:13px;font-weight:600;color:#444;margin-bottom:4px">${escHtml(field.label)}</div>
        <div style="font-size:12px;color:#888;margin-bottom:6px">💡 ${escHtml(field.hint)}</div>
        <input type="text"
          style="width:100%;box-sizing:border-box;padding:8px 12px;border:2px solid ${checked ? (correct ? '#5E9B4E' : '#E74C3C') : '#ddd'};border-radius:8px;font-size:14px;font-family:inherit;background:${checked ? (correct ? '#F0FFF4' : '#FFF0F0') : '#fff'}"
          placeholder="${escHtml(field.placeholder || '')}"
          value="${escHtml(val)}"
          ${checked ? 'disabled' : ''}
          oninput="if(!state.formState['${stateKey}'])state.formState['${stateKey}']={answers:{},checked:false};state.formState['${stateKey}'].answers[${fi}]=this.value"
        >

function fotokaartRecord(sk) {
  if (!state.fotoState) state.fotoState = {};
  if (!state.fotoState[sk]) state.fotoState[sk] = { started: false, recording: false, transcript: '', score: null, shown: false };
  const fs = state.fotoState[sk];

  if (fs.recording) {
    // Stop — the onend handler will capture the result
    if (window._fotoRecognizer) {
      window._fotoRecognizer.stop();
      window._fotoRecognizer = null;
    }
    fs.recording = false;
    render(true);
    return;
  }

  // Start recording
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('Speech recognition not supported in this browser. Please use Chrome or Edge.');
    return;
  }

  const rec = new SpeechRecognition();
  rec.lang = 'nl-NL';
  rec.continuous = true;
  rec.interimResults = true;
  window._fotoRecognizer = rec;

  let finalTranscript = '';

  rec.onresult = (e) => {
    finalTranscript = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) finalTranscript += e.results[i][0].transcript + ' ';
    }
    // Show interim
    const btn = document.getElementById('foto-btn-' + sk);
    if (btn) btn.title = finalTranscript;
  };

  rec.onend = () => {
    if (!state.fotoState[sk]) return;
    state.fotoState[sk].recording = false;
    state.fotoState[sk].transcript = finalTranscript.trim() || state.fotoState[sk].transcript;
    window._fotoRecognizer = null;
    render(true);
  };

  rec.onerror = (e) => {
    state.fotoState[sk].recording = false;
    window._fotoRecognizer = null;
    if (e.error !== 'aborted') alert('Microphone error: ' + e.error);
    render(true);
  };

  fs.recording = true;
  render(true);
  rec.start();
}

function renderReorderExercise(ex, idx, mod, lesson) {
  const stateKey = `reorder_${lesson.id}_${idx}`;
  if (!state.reorderState[stateKey]) {
    // Initialize with properly shuffled words using Fisher-Yates
    const shuffled = fisherYatesShuffle([...ex.correctOrder], seededRandom(stateKey + '_shuffle'));
    state.reorderState[stateKey] = { placed: [], available: shuffled, checked: false };
  }
  const rs = state.reorderState[stateKey];
  const isCorrect = rs.checked && rs.placed.join(' ') === ex.correctOrder.join(' ');
  const isWrong = rs.checked && !isCorrect;

  return `
    <div class="exercise-card" style="border-left-color:${rs.checked ? (isCorrect ? '#5E9B4E' : '#E74C3C') : mod.color}">
      <div style="font-size:12px;color:#888;margin-bottom:8px">💡 ${escHtml(ex.hint)}</div>

      <div class="word-bank target" style="${isCorrect ? 'border-color:#5E9B4E;background:#E8F8E8' : isWrong ? 'border-color:#E74C3C;background:#FFEBEE' : ''}">
        ${rs.placed.length === 0 ? '<span style="color:#bbb;font-size:14px">Tap words to build the sentence · แตะคำเพื่อสร้างประโยค</span>' : ''}
        ${rs.placed.map((w, i) => `<button class="word-chip in-target ${isCorrect ? 'chip-correct' : isWrong ? 'chip-wrong' : ''}"
          ${rs.checked ? 'disabled' : `onclick="reorderRemoveWord('${stateKey}',${i})"`}>${escHtml(w)}</button>`).join('')}
      </div>

      <div class="word-bank">
        ${rs.available.map((w, i) => `<button class="word-chip"
          ${rs.checked ? 'disabled' : `onclick="reorderPlaceWord('${stateKey}',${i})"`}>${escHtml(w)}</button>`).join('')}
      </div>

      ${!rs.checked ? `
        <div style="display:flex;gap:8px">
          <button style="padding:8px 16px;border-radius:8px;border:2px solid ${mod.color};background:#fff;color:${mod.color};font-weight:600;cursor:pointer;font-family:inherit;font-size:13px"
            ${rs.placed.length !== ex.correctOrder.length ? 'disabled style="opacity:0.5;padding:8px 16px;border-radius:8px;border:2px solid #ccc;background:#fff;color:#ccc;font-weight:600;cursor:default;font-family:inherit;font-size:13px"' : ''}
            onclick="checkReorder('${stateKey}')">
            Check · ตรวจ
          </button>
          <button style="padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#f8f8f8;color:#888;font-weight:500;cursor:pointer;font-family:inherit;font-size:13px"
            onclick="resetReorder('${stateKey}',${JSON.stringify(ex.correctOrder).replace(/"/g,'&quot;')})">
            🔄 Reset
          </button>
        </div>
      ` : `
        <div style="margin-top:6px;font-size:14px">
          ${isCorrect ? `<span style="color:#5E9B4E;font-weight:600">✅ Perfect! · สุดยอด!</span>` :
            `<span style="color:#E74C3C;font-weight:600">❌ Correct order: <strong style="color:#333">${escHtml(ex.correctOrder.join(' '))}</strong></span>`}
        </div>
      `}
    </div>
  `;
}

function reorderPlaceWord(stateKey, availIdx) {
  const rs = state.reorderState[stateKey];
  if (!rs || rs.checked) return;
  const word = rs.available[availIdx];
  rs.placed.push(word);
  rs.available.splice(availIdx, 1);
  render(true);
}

function reorderRemoveWord(stateKey, placedIdx) {
  const rs = state.reorderState[stateKey];
  if (!rs || rs.checked) return;
  const word = rs.placed[placedIdx];
  rs.placed.splice(placedIdx, 1);
  rs.available.push(word);
  render(true);
}

function checkReorder(stateKey) {
  const rs = state.reorderState[stateKey];
  if (rs) rs.checked = true;
  render(true);
}

function resetReorder(stateKey, correctOrder) {
  const shuffled = fisherYatesShuffle([...correctOrder], seededRandom(stateKey + '_' + Date.now()));
  state.reorderState[stateKey] = { placed: [], available: shuffled, checked: false };
  render(true);
}

function renderMatchExercise(ex, idx, mod, lesson) {
  const stateKey = `match_${lesson.id}_${idx}`;
  if (!state.matchState[stateKey]) {
    // Shuffle both sides independently using Fisher-Yates
    const nlOrder = fisherYatesShuffle(ex.pairs.map((p, i) => i), seededRandom(stateKey + '_nl'));
    const enOrder = fisherYatesShuffle(ex.pairs.map((p, i) => i), seededRandom(stateKey + '_en'));
    state.matchState[stateKey] = {
      nlOrder, enOrder,
      selected: null, // { side: 'nl'|'en', idx: number }
      matched: [], // array of pair indices that are matched
      wrong: null, // briefly highlight wrong pair
      attempts: 0
    };
  }
  const ms = state.matchState[stateKey];
  const allMatched = ms.matched.length === ex.pairs.length;

  return `
    <div class="exercise-card" style="border-left-color:${allMatched ? '#5E9B4E' : mod.color}">
      <div style="font-size:12px;color:#888;margin-bottom:12px">🇳🇱 จับคู่คำดัตช์กับคำแปลภาษาไทย · Match Dutch with Thai</div>
      ${allMatched ? `<div style="text-align:center;margin-bottom:12px;font-size:15px;color:#5E9B4E;font-weight:600">✅ All matched! · จับคู่ครบแล้ว! (${ms.attempts} attempts)</div>` : ''}
      <div class="match-grid">
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:2px">Nederlands 🇳🇱</div>
          ${ms.nlOrder.map(pairIdx => {
            const pair = ex.pairs[pairIdx];
            const isMatched = ms.matched.includes(pairIdx);
            const isSelected = ms.selected && ms.selected.side === 'nl' && ms.selected.pairIdx === pairIdx;
            const isWrong = ms.wrong && ms.wrong.side === 'nl' && ms.wrong.pairIdx === pairIdx;
            return `<button class="match-btn ${isMatched ? 'match-correct' : isSelected ? 'match-selected' : isWrong ? 'match-wrong' : ''}"
              ${isMatched ? 'disabled' : ''}
              onclick="matchSelect('${stateKey}','nl',${pairIdx})">
              ${escHtml(pair.nl)}
            </button>`;
          }).join('')}
        </div>
        <div style="display:flex;flex-direction:column;gap:8px">
          <div style="font-size:11px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:1px;text-align:center;margin-bottom:2px">ภาษาไทย 🇹🇭</div>
          ${ms.enOrder.map(pairIdx => {
            const pair = ex.pairs[pairIdx];
            const isMatched = ms.matched.includes(pairIdx);
            const isSelected = ms.selected && ms.selected.side === 'en' && ms.selected.pairIdx === pairIdx;
            const isWrong = ms.wrong && ms.wrong.side === 'en' && ms.wrong.pairIdx === pairIdx;
            const thaiLabel = pair.thai || pair.en;
            return `<button class="match-btn ${isMatched ? 'match-correct' : isSelected ? 'match-selected' : isWrong ? 'match-wrong' : ''}"
              ${isMatched ? 'disabled' : ''}
              onclick="matchSelect('${stateKey}','en',${pairIdx})">
              <span style="display:block;font-size:14px">${escHtml(thaiLabel)}</span>
              ${pair.thai ? `<span style="display:block;font-size:11px;opacity:0.6;margin-top:1px">${escHtml(pair.en)}</span>` : ''}
            </button>`;
          }).join('')}
        </div>
      </div>
      ${!allMatched ? `<div style="margin-top:10px;text-align:center;font-size:12px;color:#bbb">${ms.matched.length}/${ex.pairs.length} matched</div>` : `
        <button style="margin-top:10px;padding:8px 16px;border-radius:8px;border:1px solid #ddd;background:#f8f8f8;color:#888;font-weight:500;cursor:pointer;font-family:inherit;font-size:13px"
          onclick="resetMatch('${stateKey}',${ex.pairs.length})">🔄 Play Again</button>
      `}
    </div>
  `;
}

function matchSelect(stateKey, side, pairIdx) {
  const ms = state.matchState[stateKey];
  if (!ms || ms.matched.includes(pairIdx)) return;

  // Clear wrong highlight
  ms.wrong = null;

  if (!ms.selected) {
    // First selection
    ms.selected = { side, pairIdx };
  } else if (ms.selected.side === side) {
    // Same side — change selection
    if (ms.selected.pairIdx === pairIdx) {
      ms.selected = null; // Deselect
    } else {
      ms.selected = { side, pairIdx };
    }
  } else {
    // Different side — check match
    ms.attempts++;
    if (ms.selected.pairIdx === pairIdx) {
      // Correct match!
      ms.matched.push(pairIdx);
      ms.selected = null;
    } else {
      // Wrong match
      ms.wrong = { side, pairIdx };
      ms.selected = null;
      // Clear wrong highlight after 500ms
      setTimeout(() => {
        if (state.matchState[stateKey]) {
          state.matchState[stateKey].wrong = null;
          render(true);
        }
      }, 600);
    }
  }
  render(true);
}

function resetMatch(stateKey, pairCount) {
  delete state.matchState[stateKey];
  render(true);
}

function getAllExamQuestions(section) {
  const questions = [];
  COURSE_DATA.modules.forEach(mod => {
    if (mod.comingSoon) return;
    if (section !== 'all' && mod.section !== section) return;
    mod.lessons.forEach(lesson => {
      lesson.exercises.forEach(ex => {
        questions.push({
          ...ex,
          moduleTitle: mod.title,
          lessonTitle: lesson.title,
          section: mod.section,
          sectionIcon: mod.section === 'taal' ? '🇳🇱' : mod.section === 'kns' ? '🏛️' : '🗣️',
          color: mod.color
        });
      });
    });
  });
  return questions;
}

function startExam(section, count, minutes) {
  const allQ = getAllExamQuestions(section);
  const selected = fisherYatesShuffle([...allQ]).slice(0, Math.min(count, allQ.length));
  // Also shuffle options for each question
  selected.forEach(q => {
    if (q.options) q.options = fisherYatesShuffle([...q.options]);
  });
  // Clear any existing timer
  if (state.examTimerInterval) clearInterval(state.examTimerInterval);
  state.examActive = true;
  state.examQuestions = selected;
  state.examAnswers = {};
  state.examCurrentQ = 0;
  state.examFinished = false;
  state.examTimeLeft = minutes * 60;
  state.examSection = section;
  // Start countdown
  state.examTimerInterval = setInterval(() => {
    state.examTimeLeft--;
    // Update timer display without full re-render
    const timerEl = document.getElementById('exam-timer');
    if (timerEl) {
      const m = Math.floor(state.examTimeLeft / 60);
      const s = state.examTimeLeft % 60;
      timerEl.textContent = `⏱ ${m}:${s.toString().padStart(2,'0')}`;
      timerEl.className = 'exam-timer' + (state.examTimeLeft <= 120 ? ' warning' : '');
    }
    if (state.examTimeLeft <= 0) {
      finishExam();
    }
  }, 1000);
  render();
}

function finishExam() {
  if (state.examTimerInterval) clearInterval(state.examTimerInterval);
  state.examTimerInterval = null;
  state.examFinished = true;
  state.examActive = false;
  // Calculate results
  const qs = state.examQuestions;
  const correct = qs.filter((q, i) => state.examAnswers[i] === q.answer).length;
  const total = qs.length;
  const pct = Math.round(correct / total * 100);
  // Save to history
  const result = {
    date: new Date().toISOString(),
    section: state.examSection,
    correct, total, pct,
    timeUsed: (state.examSection === 'all' ? 30 : 15) * 60 - Math.max(0, state.examTimeLeft)
  };
  state.examHistory = [result, ...state.examHistory].slice(0, 20);
  localStorage.setItem('dutchExamHistory', JSON.stringify(state.examHistory));
  render();
}

function examSelectAnswer(qIdx, answer) {
  if (state.examFinished) return;
  state.examAnswers[qIdx] = answer;
  render(true);
}

function examGoTo(qIdx) {
  state.examCurrentQ = qIdx;
  render(true);
}

function examNext() {
  if (state.examCurrentQ < state.examQuestions.length - 1) {
    state.examCurrentQ++;
    render(true);
  }
}

function examPrev() {
  if (state.examCurrentQ > 0) {
    state.examCurrentQ--;
    render(true);
  }
}

function renderExam() {
  // Pre-exam: section selection screen
  if (!state.examActive && !state.examFinished) {
    return renderExamSetup();
  }
  // Post-exam: results
  if (state.examFinished) {
    return renderExamResults();
  }
  // Active exam
  return renderExamActive();
}

// ============================================================
// SPEECH RECOGNITION ENGINE
// ============================================================
// Strategy: Start recognizer ONCE, keep it running continuously via onend auto-restart.
// .start() is called exactly ONCE. Tapping 🎤 just sets the expected word.
// This means Chrome asks for permission exactly ONCE.
let speechRecognizer = null;
let speechRecSession = null;
let speechRecKeepAlive = false; // Controls auto-restart loop

function acquireMicStream() {
  if (state.micStream) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    state.micStream = stream;
    state.micPermission = 'granted';
    // Start the always-on recognizer
    startContinuousRecognizer();
    render(true);
  }).catch(() => {
    state.micStream = null;
    state.micPermission = 'denied';
    render(true);
  });
}

function startContinuousRecognizer() {
  if (speechRecognizer || !SpeechRecAPI) return;
  try {
    speechRecognizer = new SpeechRecAPI();
  } catch(e) { return; }
  speechRecognizer.lang = 'nl-NL';
  speechRecognizer.interimResults = true;
  speechRecognizer.maxAlternatives = 5;
  speechRecognizer.continuous = true;

  speechRecKeepAlive = true;

  speechRecognizer.onresult = function(event) {
    const session = speechRecSession;
    if (!session || session.done) return;
    let candidates = [], interim = '';
    for (let i = session.resultOffset; i < event.results.length; i++) {
      if (event.results[i].isFinal) {
        for (let j = 0; j < event.results[i].length; j++) candidates.push(event.results[i][j].transcript);
      } else { interim = event.results[i][0].transcript; }
    }
    if (!candidates.length && interim && session.resultDiv)
      session.resultDiv.innerHTML = `<span class="speech-result listening">🎤 "${escHtml(interim)}"...</span>`;
    if (candidates.length) {
      candidates.forEach(c => {
        const sc = comparePronunciation(c, session.expectedText);
        if (sc > session.bestScore) { session.bestScore = sc; session.bestText = c; }
      });
      if (session.bestScore >= 90) { finishSession(session); return; }
      if (session.silTimer) clearTimeout(session.silTimer);
      session.silTimer = setTimeout(() => finishSession(session), 2000);
    }
  };

  speechRecognizer.onerror = function(event) {
    const session = speechRecSession;
    if (!session || session.done) return;
    if (event.error === 'no-speech') {
      if (session.bestText) finishSession(session); else {
        session.done = true;
        if (session.resultDiv) session.resultDiv.innerHTML = '<span class="speech-result wrong">🔇 ไม่ได้ยินเสียง — ลองพูดดังขึ้น</span>';
        if (session.micBtn) session.micBtn.classList.remove('recording');
        state.speechRecActive = false;
        speechRecSession = null;
      }
    } else if (event.error === 'aborted') {
      // Aborted by us, ignore
    } else if (event.error === 'not-allowed') {
      speechRecKeepAlive = false;
    }
  };

  // Auto-restart: when the recognizer ends (browser timeout, etc.), restart it
  // This is the KEY: .start() is only called here and on initial start
  speechRecognizer.onend = function() {
    if (speechRecKeepAlive) {
      try { speechRecognizer.start(); } catch(e) {}
    }
    const session = speechRecSession;
    if (session && !session.done) {
      finishSession(session);
    }
  };

  try { speechRecognizer.start(); } catch(e) {}
}

function finishSession(session) {
  if (session.done) return;
  session.done = true;
  if (session.silTimer) clearTimeout(session.silTimer);
  if (session.maxTimer) clearTimeout(session.maxTimer);
  if (session.bestText) {
    const s = session.bestScore;
    const cls = s >= 80 ? 'correct' : s >= 50 ? 'partial' : 'wrong';
    const emoji = s >= 80 ? '✅' : s >= 50 ? '🟡' : '❌';
    const msg = s >= 80 ? 'สุดยอด! Excellent!' : s >= 50 ? 'พอใช้! Good try!' : 'ลองอีกครั้ง Try again';
    if (session.resultDiv) session.resultDiv.innerHTML = `
      <div class="speech-result ${cls}">${emoji} <strong>${s}%</strong> — ${msg}</div>
      <div style="font-size:13px;color:#888;margin-top:4px">
        คุณพูด: "<em>${escHtml(session.bestText)}</em>"
        ${s < 100 ? `<br>ต้องพูด: "<em>${escHtml(session.expectedText)}</em>"` : ''}
      </div>`;
  } else {
    if (session.resultDiv) session.resultDiv.innerHTML = '<span class="speech-result wrong">🔇 ไม่ได้ยินเสียง — ลองพูดดังขึ้น</span>';
  }
  if (session.micBtn) session.micBtn.classList.remove('recording');
  state.speechRecActive = false;
  speechRecSession = null;
}

function releaseMicStream() {
  speechRecKeepAlive = false;
  if (speechRecognizer) {
    try { speechRecognizer.abort(); } catch(e) {}
    speechRecognizer = null;
  }
  if (state.micStream) {
    state.micStream.getTracks().forEach(t => t.stop());
    state.micStream = null;
  }
  speechRecSession = null;
  state.speechRecActive = false;
}

  }

  if (resultDiv) resultDiv.innerHTML = '<span class="speech-result listening">🎤 กำลังฟัง... พูดให้ชัดนะ</span>';
  if (micBtn) micBtn.classList.add('recording');
  state.speechRecActive = true;

  // Track the current result offset so we only process NEW results
  let resultOffset = 0;
  try {
    // Get current results length from any pending recognition
    // We'll track from the onresult handler
  } catch(e) {}

  const session = {
    expectedText,
    resultDiv,
    micBtn,
    bestText: '',
    bestScore: 0,
    silTimer: null,
    maxTimer: null,
    done: false,
    resultOffset: 0 // Will be updated on first result event

  if (speechRecognizer && speechRecognizer._lastResultLength) {

  session.maxTimer = setTimeout(() => {

  }, 8000);
}

const _origOnResult = null;

// Dutch number words ↔ digits for speech recognition
const NL_NUMBERS = {
  'nul':0,'één':1,'een':1,'twee':2,'drie':3,'vier':4,'vijf':5,'zes':6,'zeven':7,'acht':8,'negen':9,
  'tien':10,'elf':11,'twaalf':12,'dertien':13,'veertien':14,'vijftien':15,'zestien':16,
  'zeventien':17,'achttien':18,'negentien':19,'twintig':20,'dertig':30,'veertig':40,
  'vijftig':50,'zestig':60,'zeventig':70,'tachtig':80,'negentig':90,'honderd':100,'duizend':1000
};
const NL_DIGITS = Object.fromEntries(Object.entries(NL_NUMBERS).map(([w,n])=>[String(n),w]));

function normalizeNlNumbers(s) {
  // Replace digit sequences with their word equivalents (for comparison)
  return s.replace(/\b(\d+)\b/g, n => NL_DIGITS[n] || n);
}
function normalizeNlWords(s) {
  // Replace number words with digits
  return s.replace(/\b(nul|één|een|twee|drie|vier|vijf|zes|zeven|acht|negen|tien|elf|twaalf|dertien|veertien|vijftien|zestien|zeventien|achttien|negentien|twintig|dertig|veertig|vijftig|zestig|zeventig|tachtig|negentig|honderd|duizend)\b/gi,
    w => NL_NUMBERS[w.toLowerCase()] ?? w);
}

function comparePronunciation(spoken, expected) {
  // Normalize: lowercase, remove punctuation, collapse spaces
  const norm = (s) => s.toLowerCase().replace(/[.,!?;:'"()\-]/g, '').replace(/\s+/g, ' ').trim();
  const spokenNorm = norm(spoken);
  const expectedNorm = norm(expected);

  if (spokenNorm === expectedNorm) return 100;

  // Number equivalence: try both word→digit and digit→word normalizations
  const spokenDigits = normalizeNlWords(spokenNorm);
  const expectedDigits = normalizeNlWords(expectedNorm);
  const spokenWordNorm = normalizeNlNumbers(spokenNorm);
  const expectedWordNorm = normalizeNlNumbers(expectedNorm);
  if (spokenDigits === expectedDigits) return 97;
  if (spokenWordNorm === expectedWordNorm) return 97;
  if (spokenDigits === expectedNorm || spokenWordNorm === expectedNorm) return 97;
  if (spokenNorm === expectedDigits || spokenNorm === expectedWordNorm) return 97;

  // Also try common Dutch pronunciation equivalences
  const dutchNorm = (s) => s
    .replace(/ij/g, 'y').replace(/ei/g, 'y')  // ij/ei sound the same
    .replace(/ou/g, 'au')  // ou/au same
    .replace(/dt$/g, 't').replace(/d$/g, 't')  // final d = t
    .replace(/\bik\b/g, 'ik').replace(/\bheb\b/g, 'hep')  // final b = p
    .replace(/sch/g, 'sg');

  if (dutchNorm(spokenNorm) === dutchNorm(expectedNorm)) return 95;
  if (dutchNorm(normalizeNlWords(spokenNorm)) === dutchNorm(normalizeNlWords(expectedNorm))) return 93;

  // Word-level comparison with fuzzy matching
  const spokenWords = spokenNorm.split(' ');
  const expectedWords = expectedNorm.split(' ');

  let matches = 0;
  const usedExpected = new Set();
  spokenWords.forEach(sw => {
    // Try exact match first
    let idx = expectedWords.findIndex((ew, i) => !usedExpected.has(i) && ew === sw);
    if (idx < 0) {
      // Try with Levenshtein tolerance (allow 1 edit for short words, 2 for longer)
      idx = expectedWords.findIndex((ew, i) => {
        if (usedExpected.has(i)) return false;
        const maxDist = Math.max(ew.length, sw.length) <= 4 ? 1 : 2;
        return levenshtein(ew, sw) <= maxDist;
      });
    }
    if (idx < 0) {
      // Try Dutch normalization match
      idx = expectedWords.findIndex((ew, i) => !usedExpected.has(i) && dutchNorm(ew) === dutchNorm(sw));
    }
    if (idx >= 0) {
      matches++;
      usedExpected.add(idx);
    }
  });

  const score = Math.round((matches / Math.max(expectedWords.length, 1)) * 100);
  return Math.min(score, 100);
}

function levenshtein(a, b) {
  if (a.length === 0) return b.length;
  if (b.length === 0) return a.length;
  const matrix = [];
  for (let i = 0; i <= b.length; i++) matrix[i] = [i];
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      const cost = b.charAt(i-1) === a.charAt(j-1) ? 0 : 1;
      matrix[i][j] = Math.min(matrix[i-1][j]+1, matrix[i][j-1]+1, matrix[i-1][j-1]+cost);
    }
  }
  return matrix[b.length][a.length];
}

    ${lesson.vocab.slice(0, 12).map((v, i) => {
      const rid = `sr_vocab_${lesson.id}_${i}`;
      return `
      <div class="speak-practice-card">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
          <div style="flex:1;min-width:0">
            <div class="serif" style="font-size:20px;font-weight:700;color:${mod.color}">${escHtml(v.nl)}</div>
            <div style="font-size:13px;color:#888">/${escHtml(v.phonetic)}/ · ${escHtml(v.en)} ${v.thai ? `· ${v.thai}` : ''}</div>
          </div>
          <div style="display:flex;gap:8px;align-items:center">
            <button class="speak-btn" onclick="speakAndHighlight(this,'${escHtml(v.nl).replace(/'/g,"\\'")}')">🔊</button>
            <button class="mic-btn" id="mic-${rid}" onclick="startSpeechRec('${escHtml(v.nl).replace(/'/g,"\\'")}','${rid}')">🎤</button>
          </div>
        </div>
        <div id="${rid}" style="min-height:8px;margin-top:4px"></div>
      </div>`;
    }).join('')}

    ${lesson.dialogues && lesson.dialogues.length > 0 ? `
      <div class="exercise-section-title">🎭 Dialogue Sentences — ประโยคจากบทสนทนา</div>
      ${lesson.dialogues[0].lines.slice(0, 6).map((line, i) => {
        const rid = `sr_dial_${lesson.id}_${i}`;
        return `
        <div class="speak-practice-card">
          <div style="display:flex;align-items:center;justify-content:space-between;gap:12px">
            <div style="flex:1;min-width:0">
              <div class="serif" style="font-size:16px;font-weight:600;color:#333">${escHtml(line.nl)}</div>
              <div style="font-size:13px;color:#888">${escHtml(line.en)}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
              <button class="speak-btn speak-btn-sm" onclick="speakAndHighlight(this,'${escHtml(line.nl).replace(/'/g,"\\'")}')">🔊</button>
              <button class="mic-btn" id="mic-${rid}" onclick="startSpeechRec('${escHtml(line.nl).replace(/'/g,"\\'")}','${rid}')" style="width:38px;height:38px;font-size:18px">🎤</button>
            </div>
          </div>
          <div id="${rid}" style="min-height:8px;margin-top:4px"></div>
        </div>`;
      }).join('')}
    ` : ''}

    <div style="margin-top:20px;background:#F0F7FF;border:1px solid #D0E3F5;border-radius:10px;padding:14px 16px;font-size:13px;color:#555">
      <strong>🇹🇭 Tips for Thai speakers:</strong>
      <div style="margin-top:6px;line-height:1.7">
        • Dutch <strong>g/ch</strong> — like Thai ค but rougher, from the back of the throat<br>
        • Dutch <strong>ui</strong> — no Thai equivalent! Try saying "เออ" with rounded lips<br>
        • Dutch <strong>sch</strong> — like "สค" (s + ch together)<br>
        • Dutch <strong>r</strong> — can be rolled or guttural, both are accepted<br>
        • Focus on getting the <strong>vowels</strong> right — Dutch has many vowels Thai doesn't have
      </div>
    </div>
  `;
}

// Auto-translate English to Thai using the lesson's vocab as dictionary
function autoThaiTranslate(enText, lesson) {
  if (!lesson || !lesson.vocab) return null;
  const words = lesson.vocab.filter(v => v.thai);
  if (words.length === 0) return null;
  let result = enText;
  // Build translation by matching English words to Thai
  const thaiParts = [];
  const enLower = enText.toLowerCase();
  for (const v of words) {
    if (enLower.includes(v.en.toLowerCase())) {
      thaiParts.push(v.thai);
    }
  }
  return thaiParts.length > 0 ? thaiParts.join(' · ') : null;
}

function renderDialogue(mod, lesson) {
  return lesson.dialogues.map(d => `
    <div class="dialogue-box" style="--mod-color:${mod.color}">

        <h3 style="margin:0;color:${mod.color}" class="serif">🎭 ${escHtml(d.situation)}</h3>
        <button id="play-dialogue-btn" class="listen-btn" style="border-color:${mod.color};color:${mod.color};background:#fff;padding:8px 14px;font-size:13px" onclick="playDialogue()">▶ ฟัง · Listen</button>
      </div>
      ${d.lines.map(l => {
        const isYou = l.speaker === 'You';
        const thaiLine = l.th || autoThaiTranslate(l.en, lesson);
        return `<div class="dialogue-line ${isYou ? 'you' : 'other'}" style="${isYou ? '--mod-color:'+mod.color+';border-left-color:'+mod.color : ''}">
          <div class="dialogue-line-header">
            <div class="speaker" style="color:${isYou ? mod.color : '#888'}">${escHtml(l.speaker)}</div>
            <button class="speak-btn speak-btn-sm" onclick="speakAndHighlight(this,'${escHtml(l.nl).replace(/'/g,"\\'")}')">🔊</button>
          </div>
          <div class="nl-text serif">${escHtml(l.nl)}</div>
          ${thaiLine ? `<div style="font-size:15px;color:#444;margin-top:3px;font-family:'Sarabun',sans-serif">${thaiLine}</div>` : ''}
          <div class="en-text" style="font-size:13px;color:#aaa;margin-top:1px">${escHtml(l.en)}</div>
        </div>`;
      }).join('')}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px">
        <p style="font-size:13px;color:#999;margin:0;font-style:italic">💡 ลองอ่านประโยคภาษาดัตช์ออกเสียงดังๆ ก่อนดูคำแปล!</p>
        <div class="speed-control">
          <span style="font-size:12px;color:#888">Speed:</span>
          ${[0.6, 1.0].map(r => `<button class="speed-btn ${state.speechRate === r ? 'active-speed' : ''}" data-rate="${r}" onclick="setSpeed(${r})">${r === 0.6 ? '🐢' : '🚶'}</button>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

  const g = lesson.grammar;
  if (!g) return '<p>No grammar notes for this lesson. · ยังไม่มีบันทึกไวยากรณ์สำหรับบทเรียนนี้</p>';
  return `
    <div class="grammar-box">
      <h3 style="margin:0 0 4px;color:${mod.color}" class="serif">${escHtml(g.title)}</h3>
      <p style="font-size:12px;color:#999;margin:0 0 16px">ไวยากรณ์ · Grammar Notes</p>
      <p style="font-size:15px;line-height:1.7;color:#444;margin:0 0 20px">${g.explanation}</p>
      <p style="font-size:13px;color:#888;margin:0 0 12px;font-weight:600">ตัวอย่าง · Examples:</p>
      ${g.examples.map(ex => {
        const thaiEx = ex.th || autoThaiTranslate(ex.en, lesson);
        return `
        <div class="grammar-example" style="cursor:pointer" onclick="speakDutch('${escHtml(ex.nl).replace(/'/g,"\\'")}')">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div class="nl serif">${escHtml(ex.nl)}</div>
            <button class="speak-btn speak-btn-sm" onclick="event.stopPropagation();speakAndHighlight(this,'${escHtml(ex.nl).replace(/'/g,"\\'")}')">🔊</button>
          </div>
          ${thaiEx ? `<div style="font-size:15px;color:#444;margin-top:3px;font-family:'Sarabun',sans-serif">${thaiEx}</div>` : ''}
          <div style="font-size:13px;color:#aaa;margin-top:1px">${escHtml(ex.en)}</div>
        </div>`;
      }).join('')}

function renderPractice(mod, lesson) {
  const answers = state.exerciseAnswers;
  const show = state.showResults;
  const isCompleted = state.completedLessons[lesson.id];

  let scoreHtml = '';
  if (show) {
    const mcEx2 = lesson.exercises.filter(ex => Array.isArray(ex.options) && ex.options.length > 0);
    const correct = mcEx2.filter((ex,i) => answers[i] === ex.answer).length;
    const total = mcEx2.length;
    const passed = correct >= total * 0.6;
    const lessonWords = lesson.vocab.length
      + (lesson.dialogues||[]).reduce((s,d)=>s+(d.lines||[]).length,0)
      + (lesson.grammar?(lesson.grammar.examples||[]).length:0);
    scoreHtml = `
      <div class="score-card ${passed ? 'pass' : 'fail'}">
        <div class="score serif">${correct}/${total} <span style="font-size:20px;color:${passed ? '#5E9B4E' : '#c62828'}">(${Math.round(correct/total*100)}%)</span></div>
        <div class="msg">${correct === total ? '🎉 สุดยอด! Perfect! Uitstekend!' : passed ? '✅ เก่งมาก! Goed gedaan! บทเรียนเสร็จสมบูรณ์!' : '📖 ลองอีกครั้ง! Probeer het nog een keer!'}</div>
        <div style="font-size:13px;color:#888;margin-top:6px">${passed ? 'Lesson marked as completed · บทเรียนนี้เสร็จสมบูรณ์แล้ว ✓' : 'Score 60% or higher to complete this lesson · ต้องได้คะแนนอย่างน้อย 60% เพื่อให้บทเรียนเสร็จสมบูรณ์'}</div>
        ${passed ? `<div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center">
          <div style="display:inline-block;background:#FFF8E1;border:1px solid #FFE082;border-radius:8px;padding:4px 14px;font-size:14px;color:#F57F17;font-weight:700">+${20 + Math.min(getStreakData().days, 7) * 2} XP ⭐</div>
          <div style="display:inline-block;background:#E8F8E8;border:1px solid #C8E6C0;border-radius:8px;padding:4px 14px;font-size:14px;color:#2E7D32;font-weight:700">📖 ${lessonWords} ${t('คำเพิ่มความก้าวหน้า','words added to progress')}</div>
        </div>` : ''}
        ${correct < total ? `<button class="retry-btn" style="background:${mod.color}" onclick="setState({exerciseAnswers:{},showResults:false})">ลองอีกครั้ง · Try Again</button>` : ''}
      </div>
    `;
  }

  // Only show MC-style exercises (those with .options) in Practice tab
  const mcExercises = lesson.exercises.filter(ex => Array.isArray(ex.options) && ex.options.length > 0);
  if (mcExercises.length === 0) {
    const grammarHint = lesson.grammar ? `
      <div style="margin-top:16px;background:#EEF4FF;border:1px solid #C5D8FF;border-radius:10px;padding:14px 16px;text-align:left">
        <div style="font-weight:700;color:#1565C0;font-size:14px;margin-bottom:6px">📖 ${escHtml(lesson.grammar.title)}</div>
        <div style="font-size:13px;color:#555;line-height:1.6;margin-bottom:10px">${lesson.grammar.explanation.replace(/<[^>]+>/g,'').slice(0,200)}...</div>
        <button onclick="setState({activeTab:'grammar'})" style="background:#1565C0;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer">อ่านต่อใน Grammar tab →</button>
      </div>` : '';
    return `<div style="text-align:center;padding:24px 20px;color:#888">
      <div style="font-size:40px;margin-bottom:10px">📝</div>
      <p style="font-size:15px;margin:0 0 6px;color:#555">แบบฝึกหัดอยู่ในแท็บ <strong>Exercises</strong></p>
      <p style="font-size:13px;color:#bbb;margin:0 0 12px">Practice exercises → Exercises tab · ลองคลิกแท็บ Exercises</p>
      <button onclick="setState({activeTab:'exercises',clozeAnswers:{},reorderState:{},matchState:{}})" style="background:${mod.color};color:#fff;border:none;border-radius:8px;padding:10px 20px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer">ไปที่ Exercises →</button>
      ${grammarHint}
    </div>`;
  }
  const allAnswered = Object.keys(answers).length >= mcExercises.length;

  return `
    ${!show && !isCompleted ? `<div style="background:#FFF8F0;border:1px solid #F5DEC0;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#888">
      📝 ทำแบบทดสอบให้ได้ 60% ขึ้นไปเพื่อให้บทเรียนเสร็จสมบูรณ์ · Score 60%+ to complete this lesson
    </div>` : ''}
    ${isCompleted && !show ? `<div style="background:#E8F8E8;border:1px solid #C8E6C0;border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:13px;color:#2E7D32">
      ✅ บทเรียนนี้เสร็จสมบูรณ์แล้ว · Lesson completed! You can retake to practice.
    </div>` : ''}
    ${scoreHtml}
    ${mcExercises.map((ex, idx) => {
      const selected = answers[idx];
      const isCorrect = show && selected === ex.answer;
      const isWrong = show && selected && selected !== ex.answer;
      // Shuffle options with a stable seed so order stays consistent per render
      const shuffledOpts = [...ex.options];
      let _s = Math.abs((lesson.id || '').split('').reduce((a,c) => a + c.charCodeAt(0), 0) + idx * 7 + 13) || 1;
      function _nx() { _s ^= _s << 13; _s ^= _s >> 17; _s ^= _s << 5; return (_s >>> 0); }
      for (let si = shuffledOpts.length - 1; si > 0; si--) {
        const sj = _nx() % (si + 1);
        [shuffledOpts[si], shuffledOpts[sj]] = [shuffledOpts[sj], shuffledOpts[si]];
      }
      return `
        <div class="exercise-card ${show ? (isCorrect ? 'correct' : isWrong ? 'wrong' : '') : ''}">
          ${ex.th ? `<div class="question" style="font-size:16px;color:#333;margin-bottom:4px;font-family:'Sarabun',sans-serif">${idx+1}. ${ex.th}</div>` : ''}
          <div style="font-size:13px;color:#999;margin-bottom:10px" class="serif">${escHtml(ex.question)}</div>
          <div class="options-grid" style="--mod-color:${mod.color}">
            ${shuffledOpts.map(opt => {
              const isSel = selected === opt;
              const optCorrect = show && opt === ex.answer;
              const optWrong = show && isSel && opt !== ex.answer;
              let cls = 'option-btn';
              if (isSel && !show) cls += ' selected';
              if (optCorrect) cls += ' opt-correct';
              if (optWrong) cls += ' opt-wrong';
              return `<button class="${cls}" style="--mod-color:${mod.color}" ${show ? 'disabled' : ''} onclick="selectAnswer(${idx},'${escHtml(opt).replace(/'/g,"\\'")}')">
                ${escHtml(opt)}${optCorrect ? ' ✓' : ''}${optWrong ? ' ✗' : ''}
              </button>`;
            }).join('')}
          </div>
        </div>
      `;
    }).join('')}
    ${!show ? `<button class="check-btn" style="background:${allAnswered ? mod.color : '#ccc'}" ${allAnswered ? '' : 'disabled'} onclick="checkAnswers()">ตรวจคำตอบ · Check Answers</button>` : ''}
  `;
}

// ============================================================
// EVENT HANDLERS
// ============================================================
function selectAnswer(idx, answer) {
  if (state.showResults) return;
  state.exerciseAnswers = {...state.exerciseAnswers, [idx]: answer};
  render();
}

function checkAnswers() {
  state.showResults = true;
  const lesson = state.currentLesson;
  const mcExercises = lesson.exercises.filter(ex => Array.isArray(ex.options) && ex.options.length > 0);
  const correct = mcExercises.filter((ex,i) => state.exerciseAnswers[i] === ex.answer).length;
  if (correct >= mcExercises.length * 0.6) {
    const wasNew = !state.completedLessons[lesson.id];
    state.completedLessons = {...state.completedLessons, [lesson.id]: true};
    saveCompleted();
    if (wasNew) awardLessonXP(); // 20xp + streak bonus
  }
  render();
}

function flashcardNext(currentIdx, isKnown) {
  const newKnown = {...state.flashcardKnown};
  if (isKnown) newKnown[currentIdx] = true;
  else delete newKnown[currentIdx];

  // Feed into SRS
  const lesson = state.currentLesson;
  if (lesson && lesson.vocab[currentIdx]) {
    const key = srsWordKey(lesson.vocab[currentIdx], lesson.id);
    if (isKnown) {
      const existing = state.srsData[key];
      if (!existing) {
        state.srsData[key] = { box: 2, nextReview: Date.now() + SRS_INTERVALS[2], lastReview: Date.now(), streak: 1 };
      } else {
        srsMarkCorrect(key);
      }
    } else {
      state.srsData[key] = { box: 1, nextReview: Date.now(), lastReview: Date.now(), streak: 0 };
    }
    saveSRS();
  }

  // Find next non-known card
  const words = state.currentLesson.vocab;
  let next = currentIdx + 1;
  while (next < words.length && newKnown[next]) next++;
  if (next >= words.length) {
    next = 0;
    while (next < words.length && newKnown[next]) next++;
  }
  setState({flashcardIdx: next, flashcardFlipped: false, flashcardKnown: newKnown});
}

function flashcardGo(idx) {
  setState({flashcardIdx: Math.max(0, Math.min(idx, state.currentLesson.vocab.length - 1)), flashcardFlipped: false});
}

// Initial render — validate license then show
validateOnLoad();
</script>
